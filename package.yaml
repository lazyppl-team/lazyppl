name:                lazyppl
version:             1.0.1
license:             MIT
author:              "LazyPPL team"
maintainer:          "sam.staton@cs.ox.ac.uk"
copyright:           "2021-2026 LazyPPL team"
stability:       experimental
homepage: https://lazyppl-team.github.io/

extra-source-files:
- README.md
- ChangeLog.md

# Metadata used when publishing your package
synopsis:            Lazy Probabilistic Programming Library
category:            Statistics

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description: |
  LazyPPL is a Haskell library for Bayesian probabilistic programming. It supports lazy use of probability, which is useful for specifying non-parametric models, and we provide new Metropolis-Hastings algorithms to allow this. For illustrations, see <https://lazyppl-team.github.io/>.

  Note: the Gaussian process module (@LazyPPL.Distributions.GP@) uses @hmatrix@, which links against LAPACK. On Ubuntu install with @sudo apt-get install libgsl0-dev liblapack-dev@.

github: lazyppl-team/lazyppl

tested-with:
  - GHC == 8.10.7
  - GHC == 9.6.7
  - GHC == 9.8.4
  - GHC == 9.10.1

dependencies:
- base >= 4.7 && < 9
- random >= 1.2.0
- log-domain >= 0.13.2
- mtl >= 2.2.2
- transformers >= 0.5.6.2
- containers >= 0.6.5.1
- math-functions >= 0.3.4.2
# for GP
- hmatrix >= 0.20.2
# for SingleSite
- deepseq >= 1.4.4.0
- ghc-heap >= 8.10.7
# for exes
- array
- colour
- matplotlib

library:
  source-dirs: src

tests:
  logpdf-test:
    main: TestLogPdf.hs
    source-dirs: test
    dependencies:
    - lazyppl

executables:
  ibp-exe:
    main:                AdditiveClustering.hs
    source-dirs:         src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -main-is AdditiveClustering
    dependencies:
    - lazyppl
  wiener-exe:
    main:                WienerDemo.lhs
    source-dirs:         src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -main-is WienerDemo
    dependencies:
    - lazyppl
  regression-exe:
    main:                RegressionDemo.lhs
    source-dirs:         src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -main-is RegressionDemo
    dependencies:
    - lazyppl
  clustering-exe:
    main:                ClusteringDemo.lhs
    source-dirs:         src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -main-is ClusteringDemo
    dependencies:
    - lazyppl
  programinduction-exe:
    main:                ProgramInductionDemo.lhs
    source-dirs:         src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -main-is ProgramInductionDemo
    dependencies:
    - lazyppl
  mondrian-exe:
    main:                MondrianExample.hs
    source-dirs:         src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -main-is MondrianExample
    dependencies:
    - lazyppl
  gaussianprocess-exe:
    main:                GaussianProcessDemo.lhs
    source-dirs:         src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -main-is GaussianProcessDemo
    dependencies:
    - lazyppl
  index-exe:
    main:                Index.lhs
    source-dirs:         src
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -main-is Index
